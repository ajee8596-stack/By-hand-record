<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALME | Order Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --realme-yellow: #ffc800;
            --realme-black: #000000;
            --realme-gray: #1a1a1a;
            --bg: #f8f9fa;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }

        header {
            background: var(--realme-black);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-box {
            background: var(--realme-yellow);
            color: black;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 18px;
        }
        header h1 { color: white; margin: 0; font-size: 20px; letter-spacing: 2px; font-weight: 700; }

        .dashboard { max-width: 550px; margin: 30px auto; padding: 0 15px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border-top: 5px solid var(--realme-yellow);
        }

        .card-title {
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--realme-black);
            text-align: center;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 13px; 
            border-radius: 10px; border: 2px solid #eee; 
            box-sizing: border-box; font-size: 15px;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--realme-yellow); background: #fff; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; 
            border: none; font-weight: 800; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }

        .save-btn { background: var(--realme-black); color: var(--realme-yellow); margin-top: 10px; }
        .save-btn:hover { background: var(--realme-gray); transform: scale(1.01); }

        .history-btn { background: transparent; color: #555; margin-top: 15px; border: 2px solid #eee; }

        /* History Section */
        #historySection { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: var(--bg); 
            z-index: 200; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .search-panel {
            background: var(--realme-black);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-panel input { border: none; background: #222; color: white; flex: 1; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 10px; color: #888; font-size: 10px; text-transform: uppercase; text-align: left; }
        tr.data-row { background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        td { padding: 12px; font-size: 13px; }
        td:first-child { border-radius: 10px 0 0 10px; font-weight: 700; color: var(--realme-black); }
        td:last-child { border-radius: 0 10px 10px 0; }

        .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; border: 1px solid var(--realme-yellow); }
        .del-icon { color: #ff4d4f; cursor: pointer; font-size: 16px; }

        footer { text-align: center; padding: 30px; color: #ccc; font-size: 10px; letter-spacing: 1px; }
        #status { text-align: center; font-weight: bold; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">r</div>
    <h1>REALME</h1>
</header>

<div class="dashboard">
    <div class="card">
        <div class="card-title">By Hand Order Records</div>
        
        <div class="form-group">
            <label>Order Number</label>
            <input type="text" id="orderNo" placeholder="Enter Order Number">
        </div>

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="custName" placeholder="Enter Full Name">
        </div>

        <div class="form-group">
            <label>ID Card Number (CNIC)</label>
            <input type="text" id="idCard" placeholder="Enter ID Card Number">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Date</label>
                <input type="date" id="orderDate">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Pieces</label>
                <input type="number" id="pieceCount" value="1">
            </div>
        </div>

        <div class="form-group">
            <label>Attachment (Photo)</label>
            <input type="file" id="orderImg" accept="image/*">
        </div>

        <button id="saveBtn" class="btn save-btn">
            <i class="fas fa-save"></i> Save Record
        </button>
        
        <button id="viewHistoryBtn" class="btn history-btn">
            <i class="fas fa-search"></i> Find Records
        </button>

        <p id="status"></p>
    </div>
</div>

<div id="historySection">
    <div style="max-width: 950px; margin: auto;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">ORDER <span style="color: var(--realme-yellow);">LOGS</span></h2>
            <button onclick="closeHistory()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">CLOSE</button>
        </div>

        <div class="search-panel">
            <input type="text" id="searchField" placeholder="Find by Order No, Name or ID Card..." onkeyup="filterTable()">
            <button id="downloadPdf" style="background:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer;">
                <i class="fas fa-file-pdf"></i>
            </button>
        </div>

        <div style="overflow-x: auto;">
            <table id="recordsTable">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Name</th>
                        <th>ID Card</th>
                        <th>Date</th>
                        <th>Pcs</th>
                        <th>Img</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    OFFICIAL REALME PARTNER SYSTEM | AJ STUDIO &copy; 2026
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfZYBa2ZBKK9U8D0JRhlU4dGWvJrUs2PQ",
      authDomain: "by-hand-orders-record.firebaseapp.com",
      projectId: "by-hand-orders-record",
      storageBucket: "by-hand-orders-record.firebasestorage.app",
      messagingSenderId: "998045445775",
      appId: "1:998045445775:web:da285581a45af4608bcafa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('viewHistoryBtn').onclick = () => document.getElementById('historySection').style.display = 'block';
    window.closeHistory = () => document.getElementById('historySection').style.display = 'none';

    // Save
    document.getElementById('saveBtn').onclick = async () => {
        const orderNo = document.getElementById('orderNo').value;
        const name = document.getElementById('custName').value;
        const idCard = document.getElementById('idCard').value;
        const date = document.getElementById('orderDate').value;
        const pieces = document.getElementById('pieceCount').value;
        const file = document.getElementById('orderImg').files[0];

        if(!orderNo || !name || !file) { alert("Sari fields bharna zaroori hain!"); return; }

        document.getElementById('status').innerText = "Uploading... 📤";
        try {
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=30a17df9f6d3fbbc3e994f6f5a72ee77", { method: "POST", body: fd });
            const imgData = await res.json();
            
            await addDoc(collection(db, "ByHandOrders"), {
                orderNo, customerName: name, idCard: idCard, orderDate: date, pieceCount: Number(pieces), imageUrl: imgData.data.url, timestamp: serverTimestamp()
            });
            document.getElementById('status').innerText = "Record Saved Successfully! ✅";
            document.getElementById('orderNo').value = ""; document.getElementById('custName').value = ""; document.getElementById('idCard').value = "";
        } catch(e) { document.getElementById('status').innerText = "Error! ❌"; }
    };

    // Table Data
    onSnapshot(query(collection(db, "ByHandOrders"), orderBy("timestamp", "desc")), (snap) => {
        const tb = document.getElementById('tableBody'); tb.innerHTML = "";
        snap.forEach((d) => {
            const item = d.data();
            tb.innerHTML += `<tr class="data-row">
                <td>${item.orderNo}</td>
                <td>${item.customerName}</td>
                <td>${item.idCard || '-'}</td>
                <td>${item.orderDate}</td>
                <td>${item.pieceCount}</td>
                <td><a href="${item.imageUrl}" target="_blank"><img class="img-preview" src="${item.imageUrl}"></a></td>
                <td><i class="fas fa-trash-alt del-icon" onclick="window.delRec('${d.id}')"></i></td>
            </tr>`;
        });
    });

    window.delRec = async (id) => { if(confirm("Kya delete karna chahte hain?")) await deleteDoc(doc(db, "ByHandOrders", id)); };

    window.filterTable = () => {
        const filter = document.getElementById('searchField').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const content = rows[i].innerText.toUpperCase();
            rows[i].style.display = content.indexOf(filter) > -1 ? "" : "none";
        }
    };

    document.getElementById('downloadPdf').onclick = () => {
        const { jsPDF } = window.jspdf;
        const docObj = new jsPDF();
        docObj.text("REALME OFFICIAL ORDER LOG", 14, 20);
        docObj.autoTable({ html: '#recordsTable', startY: 30, columns: [0,1,2,3,4] });
        docObj.save("Realme_Log.pdf");
    };
</script>
</body>
</html>
