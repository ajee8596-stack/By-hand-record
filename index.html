<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALME | Enterprise System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        :root {
            --realme-yellow: #ffc800;
            --realme-black: #111111;
            --input-bg: #1a1a1a;
            --text-grey: #666666;
            --error: #ff4d4f;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #f8f9fa; color: #333; overflow-x: hidden; }

        /* --- AUTHENTICATION SCREEN --- */
        #authGate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card {
            background: var(--realme-black); padding: 50px 40px; border-radius: 50px;
            border: 2px solid var(--realme-yellow); text-align: center;
            width: 90%; max-width: 440px; box-shadow: 0 0 40px rgba(255, 200, 0, 0.1);
        }
        .realme-logo-box {
            background: var(--realme-yellow); color: black; display: inline-block;
            padding: 10px 30px; border-radius: 12px; font-weight: 900; font-size: 26px; margin-bottom: 35px;
        }
        .auth-card h1 { color: #fff; font-weight: 700; font-size: 28px; margin: 0; letter-spacing: 1px; }
        .auth-card p { color: var(--text-grey); font-size: 11px; margin-top: 10px; margin-bottom: 30px; letter-spacing: 2px; font-weight: 700; }

        .field-box { position: relative; width: 100%; margin-bottom: 18px; }
        .field-box input {
            width: 100%; padding: 20px; border-radius: 18px; border: 1px solid #333;
            background: var(--input-bg); color: #fff; text-align: center; font-size: 16px; outline: none;
        }
        .field-box input:focus { border-color: var(--realme-yellow); }
        .field-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-grey); cursor: pointer; }

        .primary-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--realme-yellow); color: #000; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 15px; margin-top: 15px;
        }
        .primary-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .recover-link { color: var(--text-grey); font-size: 12px; display: block; margin-top: 20px; cursor: pointer; text-decoration: underline; }

        /* --- DASHBOARD & TABLE --- */
        header { background: #000; padding: 25px; display: flex; justify-content: center; align-items: center; border-bottom: 4px solid var(--realme-yellow); position: relative; }
        .header-logo { background: var(--realme-yellow); color: #000; font-weight: 900; padding: 6px 18px; border-radius: 6px; font-size: 24px; }
        .nav-icons { position: absolute; right: 30px; display: flex; gap: 20px; color: white; cursor: pointer; font-size: 20px; }

        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .main-card { background: #fff; padding: 40px; border-radius: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 900; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #f0f0f0; background: #fafafa; font-weight: 600; outline: none; }
        .form-group input:focus { border-color: var(--realme-yellow); }

        #historySection { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; padding: 40px; overflow-y: auto; }
        .table-card { background: #fff; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); overflow: hidden; margin-top: 30px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; padding: 15px; font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px 15px; font-size: 14px; color: #333; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
        tr:hover td { background: #fafafa; }
        
        .row-img { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; border: 2px solid var(--realme-yellow); box-shadow: 0 4px 10px rgba(255,200,0,0.2); }
        .creator-tag { font-weight: 900; color: #000; }
        .del-btn { color: var(--error); cursor: pointer; font-size: 18px; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 16px 35px; border-radius: 50px; border: 2px solid var(--realme-yellow); font-weight: 700; font-size: 12px; z-index: 11000; text-transform: uppercase; }
        #toast.active { bottom: 40px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 6000; backdrop-filter: blur(8px); }
        .realme-modal { background: #fff; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div id="toast">Operation Successful</div>

<div id="authGate">
    <div class="auth-card">
        <div class="realme-logo-box">realme</div>
        <h1 id="gateTitle">Register System</h1>
        <p id="gateDesc">AUTHORIZED PERSONNEL ONLY</p>

        <div class="field-box">
            <input type="text" id="gName" placeholder="Full Name">
        </div>
        <div class="field-box" id="passContainer">
            <input type="password" id="gPass" placeholder="Access Password">
            <i class="fas fa-eye" onclick="toggleEye('gPass', this)"></i>
        </div>
        <div class="field-box" id="confirmContainer" style="display:none;">
            <input type="password" id="gConf" placeholder="Confirm Password">
            <i class="fas fa-eye" onclick="toggleEye('gConf', this)"></i>
        </div>
        <div class="field-box" id="recoveryContainer" style="display:none;">
            <input type="tel" id="gPhone" placeholder="Recovery Phone (03xxxxxxxxx)">
        </div>

        <button onclick="authLogic()" class="primary-btn" id="gateBtn">Initialize Profile</button>
        <span class="recover-link" onclick="triggerRecovery()" id="forgotBtn">Forgot Password?</span>
        <p id="gError" style="color:var(--error); font-size:11px; margin-top:20px; font-weight:900;"></p>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="realme-modal">
        <h2 style="font-weight:900;">SECURITY KEY</h2>
        <p style="color:#777; font-size:13px;">Enter master key to delete record.</p>
        <input type="text" id="masterKey" placeholder="Key: Realme" style="width:100%; padding:15px; border-radius:12px; border:2px solid #eee; text-align:center; margin-bottom:20px; outline:none;">
        <div style="display:flex; gap:12px;">
            <button onclick="closeModal('deleteModal')" style="flex:1; padding:15px; border-radius:12px; border:none; background:#eee; font-weight:700;">CANCEL</button>
            <button onclick="executeDelete()" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--error); color:white; font-weight:700;">PURGE</button>
        </div>
    </div>
</div>

<div id="mainSystem" style="display:none;">
    <header>
        <div class="header-logo">realme</div>
        <div class="nav-icons">
            <i class="fas fa-sign-out-alt" onclick="location.reload()"></i>
        </div>
    </header>

    <div class="container">
        <div class="main-card">
            <div class="form-group"><label>Order Code</label><input type="text" id="fCode" placeholder="Enter Code"></div>
            <div class="form-group"><label>Customer Name</label><input type="text" id="fName" placeholder="Enter Name"></div>
            <div class="form-group"><label>ID Card (CNIC)</label><input type="text" id="fID" placeholder="XXXXX-XXXXXXX-X" maxlength="15"></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="fPhone" placeholder="03XX-XXXXXXX"></div>
            <div style="display:flex; gap:15px;">
                <div class="form-group" style="flex:2;"><label>Date</label><input type="date" id="fDate"></div>
                <div class="form-group" style="flex:1;"><label>Qty</label><input type="number" id="fQty" value="1"></div>
            </div>
            <div class="form-group"><label>Attachment Image</label><input type="file" id="fImg" accept="image/*" style="padding:10px;"></div>
            <button id="saveBtn" class="primary-btn" style="background:var(--realme-black); color:var(--realme-yellow);">Secure Record</button>
            <button onclick="openDatabase()" class="primary-btn" style="background:#f0f0f0; color:#555; margin-top:15px;">View Database</button>
        </div>
    </div>

    <div id="historySection">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-weight:900; font-size:24px;">OFFICIAL <span style="color:var(--realme-yellow);">DATABASE</span></h2>
            <button onclick="closeDatabase()" style="background:#000; color:#fff; border:none; padding:12px 30px; border-radius:12px; font-weight:900; cursor:pointer;">CLOSE</button>
        </div>
        <div class="table-card">
            <table>
                <thead>
                    <tr><th>Code</th><th>Customer</th><th>ID Card</th><th>Phone</th><th>Date</th><th>Qty</th><th>Image</th><th>Creator</th><th>Action</th></tr>
                </thead>
                <tbody id="dbRows"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfZYBa2ZBKK9U8D0JRhlU4dGWvJrUs2PQ",
      authDomain: "by-hand-orders-record.firebaseapp.com",
      projectId: "by-hand-orders-record",
      storageBucket: "by-hand-orders-record.firebasestorage.app",
      messagingSenderId: "998045445775",
      appId: "1:998045445775:web:da285581a45af4608bcafa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- AUTH LOGIC ---
    const isReg = localStorage.getItem("rm_user");
    if(isReg) {
        document.getElementById('gateTitle').innerText = "System Access";
        document.getElementById('gateBtn').innerText = "Login System";
    } else {
        document.getElementById('confirmContainer').style.display = "block";
        document.getElementById('recoveryContainer').style.display = "block";
        document.getElementById('forgotBtn').style.display = "none";
    }

    window.toggleEye = (id, btn) => {
        const input = document.getElementById(id);
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        btn.className = isPass ? "fas fa-eye-slash" : "fas fa-eye";
    };

    let resetMode = false;
    window.triggerRecovery = () => {
        resetMode = true;
        document.getElementById('gateTitle').innerText = "Reset Password";
        document.getElementById('passContainer').style.display = "none";
        document.getElementById('recoveryContainer').style.display = "block";
        document.getElementById('gateBtn').innerText = "Verify Recovery";
    };

    window.authLogic = () => {
        const u = document.getElementById('gName').value.trim();
        const p = document.getElementById('gPass').value;
        const c = document.getElementById('gConf').value;
        const ph = document.getElementById('gPhone').value.trim();
        const err = document.getElementById('gError');

        if(!isReg) {
            if(!u || !p || !ph) { err.innerText = "ALL FIELDS REQUIRED"; return; }
            if(p !== c) { err.innerText = "PASSWORDS MISMATCH"; return; }
            localStorage.setItem("rm_user", u);
            localStorage.setItem("rm_pass", p);
            localStorage.setItem("rm_phone", ph);
            location.reload();
        } else if(resetMode) {
            if(ph === localStorage.getItem("rm_phone")) {
                const n = prompt("New Password:");
                if(n) { localStorage.setItem("rm_pass", n); location.reload(); }
            } else { err.innerText = "WRONG RECOVERY PHONE"; }
        } else {
            if(u === localStorage.getItem("rm_user") && p === localStorage.getItem("rm_pass")) {
                document.getElementById('authGate').style.display = "none";
                document.getElementById('mainSystem').style.display = "block";
            } else { err.innerText = "INVALID CREDENTIALS"; }
        }
    };

    // --- FORMATTING LOGIC ---
    // CNIC Formatting
    document.getElementById('fID').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, ''); let out = "";
        if (v.length > 0) out += v.substring(0, 5);
        if (v.length > 5) out += '-' + v.substring(5, 12);
        if (v.length > 12) out += '-' + v.substring(12, 13);
        e.target.value = out;
    });

    // Phone Formatting (03xx-xxxxxxx)
    document.getElementById('fPhone').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, ''); let out = "";
        if (v.length > 0) out += v.substring(0, 4);
        if (v.length > 4) out += '-' + v.substring(4, 11);
        e.target.value = out;
    });

    // --- MAIN OPERATIONS ---
    const msg = (text) => {
        const t = document.getElementById('toast'); t.innerText = text;
        t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 3000);
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.openDatabase = () => document.getElementById('historySection').style.display = 'block';
    window.closeDatabase = () => document.getElementById('historySection').style.display = 'none';

    let targetID = null;
    window.delReq = (id) => { targetID = id; document.getElementById('deleteModal').style.display = 'flex'; };
    window.executeDelete = async () => {
        if(document.getElementById('masterKey').value === "Realme") {
            await deleteDoc(doc(db, "ByHandOrders", targetID));
            closeModal('deleteModal'); msg("Record Purged");
            document.getElementById('masterKey').value = "";
        } else { msg("Invalid Key"); }
    };

    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];

    document.getElementById('saveBtn').onclick = async () => {
        const code = document.getElementById('fCode').value;
        const name = document.getElementById('fName').value;
        const img = document.getElementById('fImg').files[0];
        if(!code || !name || !img) { msg("Incomplete Data"); return; }

        msg("Syncing with Server...");
        try {
            const fd = new FormData(); fd.append("image", img);
            const res = await fetch("https://api.imgbb.com/1/upload?key=30a17df9f6d3fbbc3e994f6f5a72ee77", { method: "POST", body: fd });
            const data = await res.json();

            await addDoc(collection(db, "ByHandOrders"), {
                orderNo: code, customerName: name, idCard: document.getElementById('fID').value,
                phone: document.getElementById('fPhone').value, orderDate: document.getElementById('fDate').value,
                pieceCount: Number(document.getElementById('fQty').value), imageUrl: data.data.url,
                creator: localStorage.getItem("rm_user"), timestamp: serverTimestamp()
            });
            msg("Record Secured Successfully");
            document.getElementById('fCode').value = ""; document.getElementById('fName').value = "";
            document.getElementById('fID').value = ""; document.getElementById('fPhone').value = "";
        } catch(e) { msg("Sync Failed"); }
    };

    onSnapshot(query(collection(db, "ByHandOrders"), orderBy("timestamp", "desc")), (snap) => {
        const tb = document.getElementById('dbRows'); tb.innerHTML = "";
        snap.forEach((d) => {
            const r = d.data();
            tb.innerHTML += `<tr>
                <td style="font-weight:900; letter-spacing:0.5px;">${r.orderNo}</td>
                <td>${r.customerName}</td>
                <td style="font-family:monospace;">${r.idCard}</td>
                <td>${r.phone}</td>
                <td>${r.orderDate}</td>
                <td>${r.pieceCount}</td>
                <td><a href="${r.imageUrl}" target="_blank"><img class="row-img" src="${r.imageUrl}"></a></td>
                <td class="creator-tag">${r.creator}</td>
                <td><i class="fas fa-trash-alt del-btn" onclick="window.delReq('${d.id}')"></i></td>
            </tr>`;
        });
    });
</script>
</body>
</html>
