<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALME | Official Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        :root { --realme-yellow: #ffc800; --realme-black: #000000; --bg: #f8f9fa; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }

        /* Overlays & Modals Visibility Fix */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-card { background: #ffffff; padding: 40px; border-radius: 25px; text-align: center; border: 3px solid var(--realme-yellow); width: 90%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .r-logo-big { background: var(--realme-black); color: var(--realme-yellow); display: inline-block; padding: 12px 25px; font-weight: 900; font-size: 30px; border-radius: 10px; margin-bottom: 25px; }
        
        .modal-card h2 { color: #000; margin-bottom: 25px; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }
        
        /* Modal Input Fix: Dark text on Light background */
        .modal-card input { 
            background: #f0f0f0; border: 2px solid #ccc; 
            color: #000 !important; /* Force Black Text */
            padding: 15px; width: 100%; border-radius: 12px; margin-bottom: 20px; 
            text-align: center; box-sizing: border-box; font-size: 16px; font-weight: bold;
        }
        .modal-card input::placeholder { color: #888; font-weight: normal; }
        .modal-card button { background: var(--realme-black); color: var(--realme-yellow); border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* Header */
        header { background: var(--realme-black); padding: 20px; display: flex; flex-direction: column; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--realme-yellow); }
        .logo-box { background: var(--realme-yellow); color: black; font-weight: 900; padding: 6px 18px; border-radius: 6px; font-size: 24px; margin-bottom: 5px; }
        header h1 { color: white; margin: 0; font-size: 11px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.8; }
        #userDisplay { position: absolute; right: 20px; bottom: 12px; color: var(--realme-yellow); font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* Dashboard Card */
        .dashboard { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 30px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .card-title { font-weight: 900; font-size: 18px; margin-bottom: 30px; text-align: center; text-transform: uppercase; border-bottom: 2px solid #f8f8f8; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 900; color: #bbb; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f0f0f0; box-sizing: border-box; font-size: 14px; color: #000; }
        input:focus { border-color: var(--realme-yellow); background: #fffdf5; outline: none; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .save-btn { background: var(--realme-black); color: var(--realme-yellow); }
        .history-btn { background: #f0f0f0; color: #666; margin-top: 15px; }

        /* Data Table Alignment Fix */
        #historySection { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .table-container { background: white; border-radius: 20px; padding: 15px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; table-layout: fixed; }
        th { text-align: left; padding: 15px 12px; color: #aaa; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #f5f5f5; }
        td { padding: 18px 12px; font-size: 13px; color: #333; border-bottom: 1px solid #f9f9f9; word-wrap: break-word; }
        .img-preview { width: 55px; height: 55px; object-fit: cover; border-radius: 10px; border: 2px solid var(--realme-yellow); }
        .badge-creator { background: #fff9e6; color: #d4a017; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 10px; border: 1px solid #ffeeba; }
        
        footer { text-align: center; padding: 40px; color: #ccc; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal-card">
        <div class="r-logo-big">r</div>
        <h2>Staff Access</h2>
        <input type="text" id="userNameInput" placeholder="Write Your Name">
        <button onclick="handleLogin()">Enter Dashboard</button>
    </div>
</div>

<div id="deleteOverlay" class="overlay" style="display: none;">
    <div class="modal-card">
        <div class="r-logo-big" style="background: #ff4d4f; color: white;">!</div>
        <h2>Security Check</h2>
        <input type="text" id="deleteCodeInput" placeholder="Type Security Code">
        <div style="display: flex; gap: 10px;">
            <button onclick="closeDeleteModal()" style="background:#333; color:white;">Cancel</button>
            <button onclick="confirmDeletion()" style="background:#ff4d4f; color:white;">Confirm</button>
        </div>
    </div>
</div>

<header>
    <div class="logo-box">realme</div>
    <h1>By Hand Order Records</h1>
    <div id="userDisplay"></div>
</header>

<div class="dashboard">
    <div class="card">
        <div class="card-title">Entry Form</div>
        <div class="form-group"><label>Order Code</label><input type="text" id="orderNo" placeholder="Enter"></div>
        <div class="form-group"><label>Customer Name</label><input type="text" id="custName" placeholder="Full Name"></div>
        <div class="form-group"><label>ID Card Number (CNIC)</label><input type="text" id="idCard" placeholder="XXXXX-XXXXXXX-X" maxlength="15"></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="phoneNo" placeholder="03xx-xxxxxxx"></div>
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;"><label>Order Date</label><input type="date" id="orderDate"></div>
            <div class="form-group" style="flex: 1;"><label>Pieces</label><input type="number" id="pieceCount" value="1"></div>
        </div>
        <div class="form-group"><label>Record Image</label><input type="file" id="orderImg" accept="image/*"></div>
        <button id="saveBtn" class="btn-main save-btn">Save Record</button>
        <button id="viewHistoryBtn" class="btn-main history-btn">Database View</button>
        <p id="status" style="text-align: center; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<div id="historySection">
    <div style="max-width: 1250px; margin: auto;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="font-weight:900;">REALME <span style="color: var(--realme-yellow);">DATABASE</span></h2>
            <button onclick="closeHistory()" style="background:black; color:white; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:bold;">EXIT VIEW</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 120px;">Order Code</th>
                        <th style="width: 180px;">Customer</th>
                        <th style="width: 160px;">ID Card</th>
                        <th style="width: 130px;">Phone</th>
                        <th style="width: 120px;">Date</th>
                        <th style="width: 70px;">Qty</th>
                        <th style="width: 100px;">Image</th>
                        <th style="width: 130px;">Creator</th>
                        <th style="width: 80px; text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>OFFICIAL REALME PARTNER SYSTEM | AJ STUDIO &copy; 2026</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfZYBa2ZBKK9U8D0JRhlU4dGWvJrUs2PQ",
      authDomain: "by-hand-orders-record.firebaseapp.com",
      projectId: "by-hand-orders-record",
      storageBucket: "by-hand-orders-record.firebasestorage.app",
      messagingSenderId: "998045445775",
      appId: "1:998045445775:web:da285581a45af4608bcafa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ID Card Formatting (13 digits + 2 dashes) ---
    document.getElementById('idCard').addEventListener('input', function (e) {
        let val = e.target.value.replace(/\D/g, ''); 
        let res = "";
        if (val.length > 0) res += val.substring(0, 5);
        if (val.length > 5) res += '-' + val.substring(5, 12);
        if (val.length > 12) res += '-' + val.substring(12, 13);
        e.target.value = res;
    });

    // --- Login System ---
    window.handleLogin = () => {
        const name = document.getElementById('userNameInput').value.trim();
        if(!name) { alert("Please enter your name!"); return; }
        localStorage.setItem("active_creator", name);
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('userDisplay').innerText = "Logged in: " + name;
    };
    if(localStorage.getItem("active_creator")) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('userDisplay').innerText = "Logged in: " + localStorage.getItem("active_creator");
    }

    // --- Delete Security ---
    let targetID = null;
    window.delRec = (id) => { targetID = id; document.getElementById('deleteOverlay').style.display = 'flex'; };
    window.closeDeleteModal = () => { 
        document.getElementById('deleteOverlay').style.display = 'none'; 
        document.getElementById('deleteCodeInput').value = ""; 
    };
    window.confirmDeletion = async () => {
        const code = document.getElementById('deleteCodeInput').value;
        if(code === "Realme") {
            await deleteDoc(doc(db, "ByHandOrders", targetID));
            closeDeleteModal();
        } else { alert("Wrong Password!"); }
    };

    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('viewHistoryBtn').onclick = () => document.getElementById('historySection').style.display = 'block';
    window.closeHistory = () => document.getElementById('historySection').style.display = 'none';

    // --- Save Record ---
    document.getElementById('saveBtn').onclick = async () => {
        const oNo = document.getElementById('orderNo').value;
        const cName = document.getElementById('custName').value;
        const imgFile = document.getElementById('orderImg').files[0];
        
        if(!oNo || !cName || !imgFile) { alert("Please fill Order Code, Customer and Image!"); return; }

        document.getElementById('status').innerHTML = "Processing Record... ⌛";
        try {
            const formData = new FormData(); formData.append("image", imgFile);
            const res = await fetch("https://api.imgbb.com/1/upload?key=30a17df9f6d3fbbc3e994f6f5a72ee77", { method: "POST", body: formData });
            const data = await res.json();
            
            await addDoc(collection(db, "ByHandOrders"), {
                orderNo: oNo, customerName: cName, idCard: document.getElementById('idCard').value, 
                phone: document.getElementById('phoneNo').value, orderDate: document.getElementById('orderDate').value,
                pieceCount: Number(document.getElementById('pieceCount').value), imageUrl: data.data.url,
                creator: localStorage.getItem("active_creator"), timestamp: serverTimestamp()
            });
            
            document.getElementById('status').innerText = "Record Saved Successfully! ✅";
            document.getElementById('orderNo').value = ""; document.getElementById('custName').value = "";
            document.getElementById('idCard').value = ""; document.getElementById('phoneNo').value = "";
        } catch(e) { document.getElementById('status').innerText = "Error Saving Data! ❌"; }
    };

    // --- Database Stream ---
    onSnapshot(query(collection(db, "ByHandOrders"), orderBy("timestamp", "desc")), (snap) => {
        const body = document.getElementById('tableBody'); body.innerHTML = "";
        snap.forEach((d) => {
            const row = d.data();
            body.innerHTML += `<tr>
                <td style="font-weight:900; color:black;">${row.orderNo}</td>
                <td style="font-weight:700;">${row.customerName}</td>
                <td style="font-family:monospace;">${row.idCard || '-'}</td>
                <td>${row.phone || '-'}</td>
                <td>${row.orderDate}</td>
                <td style="text-align:center;">${row.pieceCount}</td>
                <td><a href="${row.imageUrl}" target="_blank"><img class="img-preview" src="${row.imageUrl}"></a></td>
                <td><span class="badge-creator">${row.creator || 'Admin'}</span></td>
                <td style="text-align:center;"><i class="fas fa-trash-alt" style="color:#ff4d4f; cursor:pointer; font-size:16px;" onclick="window.delRec('${d.id}')"></i></td>
            </tr>`;
        });
    });
</script>
</body>
</html>
